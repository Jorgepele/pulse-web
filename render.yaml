# Render blueprint for the Pulse web frontend (a static Vite build).
# In the Render dashboard: New > Blueprint, connect this repo. See DEPLOY.md.
services:
  - type: web
    name: pulse-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Point the frontend at the deployed API (e.g. https://pulse-api.onrender.com):
      - key: VITE_API_URL
        sync: false
    routes:
      # Single-page app: send every path to index.html so client routing works.
      - type: rewrite
        source: /*
        destination: /index.html
